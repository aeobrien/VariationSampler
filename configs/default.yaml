# Variation Sampler — Default Configuration
# All hyperparameters referenced in the technical brief.

model:
  d_model: 256
  n_layers: 4
  n_heads: 4
  dropout: 0.1
  nq: 9
  codebook_size: 1024
  t_max: 215
  edit_codebooks: [3, 4, 5, 6, 7, 8]

masking:
  # Per-codebook mask probability multipliers (probabilistic gradient)
  # 4x multiplier from Gate A sweep — best perceptual balance
  codebook_multipliers:
    3: 0.24
    4: 0.48
    5: 1.0
    6: 1.0
    7: 1.0
    8: 1.0
  p_tail: 0.32
  p_attack: 0.08
  attack_frames: 2  # ~23ms at 86 Hz

sampling:
  temperature: 0.9
  top_p: 0.95
  k_candidates: 8

acceptance:
  mrstft_band: [0.1, 0.8]   # [lower, upper] for MR-STFT distance
  mfcc_band: [2.0, 15.0]    # [lower, upper] for MFCC distance
  min_token_change_rate: 0.01
  max_token_change_rate: 0.30
  max_retries: 5
  min_attack_smear: 0.85
  min_transient_xcorr: 0.95
  max_hf_energy_delta_db: 6.0
  max_spectral_peak_divergence: 3
  attack_ms: 30

training:
  learning_rate: 0.0002
  batch_size: 64
  max_epochs: 100
  warmup_steps: 500
  weight_decay: 0.01
  grad_clip: 1.0
  change_rate_penalty_lambda: 0.1
  target_change_rate: 0.05
  checkpoint_every_epochs: 5
  eval_every_epochs: 1

eval:
  machine_gun_bpm: 120.0
  machine_gun_hits: 8
  n_mfcc: 13
  mrstft_resolutions:
    - [512, 88, "hann"]
    - [1024, 220, "hann"]
    - [2048, 441, "hann"]

data:
  sample_rate: 44100
  max_audio_length_s: 2.5
  trim_threshold_db: -60.0
  normalize_target_db: -18.0
  normalize_tolerance_db: 1.0

automation:
  allowed_params:
    - mask_p_attack
    - mask_p_tail
    - temperature
    - top_p
    - k_candidates
    - learning_rate
    - batch_size
    - attack_frames
    - editable_codebooks
    - acceptance_band_low
    - acceptance_band_high
  step_size_limits:
    mask_p_tail: 0.05
    mask_p_attack: 0.02
    temperature: 0.2
    top_p: 0.1
    learning_rate_factor: 2.0
    k_candidates: 4
